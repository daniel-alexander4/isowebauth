name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: isowebauth-linux-amd64.tar.gz
            webkit_dev: libwebkit2gtk-4.0-dev
            webkit_dep: libwebkit2gtk-4.0-0
            wails_tags: ""
            deb_suffix: "22.04"
          - os: ubuntu-24.04
            platform: linux/amd64
            artifact: isowebauth-linux-amd64-24.04.tar.gz
            webkit_dev: libwebkit2gtk-4.1-dev
            webkit_dep: libwebkit2gtk-4.1-0
            wails_tags: "webkit2_41"
            deb_suffix: "24.04"
          - os: macos-latest
            platform: darwin/universal
            artifact: isowebauth-macos-universal.zip
          - os: windows-latest
            platform: windows/amd64
            artifact: isowebauth-windows-amd64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.0"

      # Linux dependencies
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit_dev }}

      # Install Wails CLI
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      # Run tests (Linux only, on 22.04)
      - name: Run tests
        if: matrix.os == 'ubuntu-22.04'
        run: go test ./internal/... -count=1

      # Build (Linux & macOS)
      - name: Build
        if: runner.os != 'Windows'
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.wails_tags && format('-tags {0}', matrix.wails_tags) || '' }}

      # Build (Windows with NSIS installer)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform ${{ matrix.platform }} -nsis

      # Package Linux
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }} -C build/bin isowebauth

      # Build .deb package (Linux)
      - name: Build .deb package
        if: runner.os == 'Linux'
        env:
          VERSION: ${{ github.ref_name }}
          WEBKIT_DEP: ${{ matrix.webkit_dep }}
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          DEB_NAME="isowebauth_${VERSION#v}_amd64_${{ matrix.deb_suffix }}.deb"
          VERSION=${VERSION#v} nfpm pkg --packager deb --target "$DEB_NAME"

      # Package macOS
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }} isowebauth.app

      # Package Windows
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/isowebauth.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      # Upload .deb
      - name: Upload .deb artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: isowebauth_amd64_${{ matrix.deb_suffix }}.deb
          path: "*.deb"

      # Upload Windows installer
      - name: Upload installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: isowebauth-installer.exe
          path: build/bin/*-installer.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
