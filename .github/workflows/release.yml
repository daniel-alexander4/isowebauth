name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: sshkey-web-auth-linux-amd64.tar.gz
          - os: macos-latest
            platform: darwin/universal
            artifact: sshkey-web-auth-macos-universal.zip
          - os: windows-latest
            platform: windows/amd64
            artifact: sshkey-web-auth-windows-amd64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.0"

      # Linux dependencies
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      # Install Wails CLI
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      # Run tests (Linux only)
      - name: Run tests
        if: runner.os == 'Linux'
        run: go test ./internal/... -count=1

      # Build (Linux & macOS)
      - name: Build
        if: runner.os != 'Windows'
        run: wails build -platform ${{ matrix.platform }}

      # Build (Windows with NSIS installer)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform ${{ matrix.platform }} -nsis

      # Package Linux
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }} -C build/bin sshkey-web-auth

      # Build .deb package (Linux)
      - name: Build .deb package
        if: runner.os == 'Linux'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          VERSION=${VERSION#v} nfpm pkg --packager deb --target .

      # Package macOS
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }} sshkey-web-auth.app

      # Package Windows
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/sshkey-web-auth.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      # Upload .deb
      - name: Upload .deb artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: sshkey-web-auth_amd64.deb
          path: "*.deb"

      # Upload Windows installer
      - name: Upload installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sshkey-web-auth-amd64-installer.exe
          path: build/bin/sshkey-web-auth-amd64-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
